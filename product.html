<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CasaTanja Deals | Product</title>
    <meta name="description" content="Product details and WhatsApp order page." />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell product-page-shell">
      <header class="topbar" aria-label="Product navigation">
        <a class="icon-button" href="index.html#products" aria-label="Back" data-i18n-aria="backAria">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18 9 12l6-6" /></svg>
        </a>
        <a class="brand" href="index.html">
          <span class="brand-mark">CT</span>
          <span>CasaTanja</span>
        </a>
        <button class="language-toggle" type="button" data-lang-toggle aria-label="Change language">
          <span data-current-lang>AR</span>
          <small>FR</small>
        </button>
      </header>

      <main data-product-page></main>
    </div>

    <aside class="whatsapp-fallback" data-whatsapp-fallback>
      <div class="drawer-backdrop"></div>
      <div class="confirmation-card">
        <span class="eyebrow">WhatsApp</span>
        <h2 data-fallback-title>WhatsApp did not open?</h2>
        <p data-fallback-text>Tap the button again to send the order.</p>
        <a class="primary-action" href="#" data-whatsapp-retry target="_blank" rel="noreferrer" data-fallback-button>Open WhatsApp</a>
        <button class="ghost-admin-button" type="button" data-close-fallback>Continue shopping</button>
      </div>
    </aside>

    <script src="product-page.js"></script>
  </body>
</html>
