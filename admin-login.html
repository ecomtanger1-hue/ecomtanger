<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CasaTanja Admin Login</title>
    <link rel="stylesheet" href="styles.base.css?v=3" />
    <link rel="stylesheet" href="styles.mobile.css?v=4" media="(max-width: 899px)" />
    <link rel="stylesheet" href="styles.desktop.css?v=7" media="(min-width: 900px)" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body class="admin-body login-body">
    <main class="login-card">
      <a class="brand admin-brand" href="index.html">
        <span class="brand-mark">CT</span>
        <span>CasaTanja Admin</span>
      </a>
      <div>
        <span class="eyebrow">Protected area</span>
        <h1>Admin login</h1>
        <p>Use your Supabase admin email and password to manage products and orders.</p>
      </div>
      <form class="admin-form login-form" data-login-form>
        <label>
          Email
          <input name="email" autocomplete="username" required />
        </label>
        <label>
          Password
          <input name="password" type="password" autocomplete="current-password" required />
        </label>
        <button class="primary-action" type="submit">Log in</button>
        <p class="checkout-note" data-login-message>Admin access is managed in Supabase Auth. Local fallback still accepts admin / admin123.</p>
      </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="supabase-service.js"></script>
    <script src="admin-login.js"></script>
  </body>
</html>
