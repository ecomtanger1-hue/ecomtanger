  <rect x="1100" y="428" width="132" height="40" rx="20" fill="#f2ede4" stroke="#d7cec0"/>
  <text x="1130" y="453" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#4f453b">Material</text>
  <rect x="1244" y="428" width="132" height="40" rx="20" fill="#f2ede4" stroke="#d7cec0"/>
  <text x="1283" y="453" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#4f453b">Pack</text>
  <rect x="1100" y="480" width="132" height="40" rx="20" fill="#f2ede4" stroke="#d7cec0"/>
  <text x="1132" y="505" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#4f453b">Scent</text>
  <rect x="1244" y="480" width="132" height="40" rx="20" fill="#f2ede4" stroke="#d7cec0"/>
  <text x="1276" y="505" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#4f453b">Custom</text>
  <rect x="1100" y="574" width="276" height="1" fill="#e4ded5"/>
  <text x="1100" y="618" font-family="Inter, Segoe UI, Arial" font-size="16" font-weight="750" fill="#241e19">Publishing</text>
  <rect x="1100" y="646" width="276" height="42" rx="7" fill="#fbfaf8" stroke="#cfc7bb"/>
  <text x="1116" y="673" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#241e19">Active</text>
  <text x="1350" y="672" font-family="Inter, Segoe UI, Arial" font-size="16" fill="#776d63">⌄</text>
  <rect x="1100" y="710" width="276" height="42" rx="7" fill="#fbfaf8" stroke="#cfc7bb"/>
  <text x="1116" y="737" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#241e19">Casablanca, Rabat, Tanger</text>
  <text x="1100" y="810" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#776d63">This layout treats description as a guided writing task instead of a single blank textarea.</text>
